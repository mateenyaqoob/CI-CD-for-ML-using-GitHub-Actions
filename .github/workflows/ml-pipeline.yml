name: ML CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]   # Fix #6: scope to main only

jobs:
  # ── Job 1: Train, Evaluate, Test ─────────────────────────────────────────
  train-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"   # Fix #1: quoted so YAML reads as string, not float 3.1

    - name: Cache pip Dependencies   # Fix #15: cache pip to speed up installs
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Create Models Directory   # Fix #2 & #5: create dir before train/test
      run: mkdir -p models

    - name: Run Preprocessing
      run: python src/preprocess.py

    - name: Train Model
      run: python src/train.py

    - name: Evaluate Model   # Fix #7: evaluate.py now has an accuracy gate
      run: python src/evaluate.py

    - name: Run Unit Tests
      run: pytest test_model.py

    - name: Upload Trained Model   # Fix #9: persist model artifact across jobs
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: models/model.pkl

  # ── Job 2: Build Docker Image & Deploy ───────────────────────────────────
  build-and-deploy:
    needs: train-and-test          # Fix #12: separate job, runs only after tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # only deploy on merges to main

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Trained Model   # Fix #9: retrieve model saved by job 1
      uses: actions/download-artifact@v4
      with:
        name: trained-model
        path: models/

    - name: Log in to GitHub Container Registry   # Fix #8: authenticate before push
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t ghcr.io/${{ github.repository }}/ml-api:${{ github.sha }} .
        docker tag ghcr.io/${{ github.repository }}/ml-api:${{ github.sha }} \
                   ghcr.io/${{ github.repository }}/ml-api:latest

    - name: Push Docker Image   # Fix #8: actually push to registry
      run: |
        docker push ghcr.io/${{ github.repository }}/ml-api:${{ github.sha }}
        docker push ghcr.io/${{ github.repository }}/ml-api:latest

    - name: Simulated Deployment
      run: echo "Deployed image ghcr.io/${{ github.repository }}/ml-api:${{ github.sha }}"
